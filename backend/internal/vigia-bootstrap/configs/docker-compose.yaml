# Edite este ficheiro para definir os serviços geridos pelo vigia-bootstrap.
# Na primeira execução este modelo é copiado para o diretório de dados; depois
# pode alterá-lo à vontade — o binário não sobrescreve salvo com -force-embed-compose.
#
# A rotina de atualizações compara digests no registry para cada campo `image:`.
version: "3.8"

services: 
  fall-detection:
    image: pedroreis16/fall-detection:latest
    container_name: fall-detection
    networks:
      - vigia-network

networks:
  vigia-network:
    driver: bridge
