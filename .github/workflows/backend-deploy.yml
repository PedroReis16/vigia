name: Backend API Deploy

run-name: Backend API Deploy - v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy"
        required: true

jobs:
    validate_environment:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Validate deployments details
              shell: bash
              run: |
                if [[ ${{ github.ref_name }} != "master" ]]; then
                  echo "Esse workflow deve ser executado apenas na branch master"
                  exit 1
                fi

    project_build:
        name: Project compilation
        needs: validate_environment
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v4
              with:
                go-version: 1.26.1

            - name: Build project
              working-directory: backend
              run: go build -trimpath -ldflags="-s -w" -o vigia-api .

    publish_docker_image:
        name: Publish Docker image
        needs: project_build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push Docker image
              uses: docker/build-push-action@v4
              with:
                context: .
                file: docker-compose/dockerfiles/vigia-api.dockerfile
                push: true
                tags: ${{secrets.DOCKERHUB_USERNAME}}/gerenciamento-dispositivos:${{ inputs.version }},${{secrets.DOCKERHUB_USERNAME}}/gerenciamento-dispositivos:latest
    deploy_service:
        name: Deploy service
        needs: publish_docker_image
        runs-on: ubuntu-latest
        steps:
            - name: Pull and restart on server (SSH)
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.EC2_SERVER_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_PRIVATE_KEY }}
                  script_stop: true
                  script: |
                      set -euo pipefail
                      cd "${{ secrets.EC2_DEPLOY_PATH }}"
                      docker-compose pull gerenciamento-dispositivos
                      docker-compose up -d --remove-orphans gerenciamento-dispositivos