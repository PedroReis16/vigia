name: Backend API Deploy

run-name: Backend API Deploy - v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy"
        required: true

permissions:
  contents: read

jobs:
  security:
    name: Security (SAST, SCA, secrets, Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker-compose/dockerfiles/vigia-api.dockerfile
          failure-threshold: error

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: backend/go.sum

      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Gosec (Go SAST)
        working-directory: backend
        run: gosec ./...

      - name: Govulncheck (dependency vulnerabilities)
        working-directory: backend
        run: govulncheck ./...

  project_build:
    name: Project compilation
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: backend/go.sum

      - name: Build project
        working-directory: backend
        run: go build -trimpath -ldflags="-s -w" -o vigia-api .

  publish_docker_image:
    name: Publish Docker image
    needs: [security, project_build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (load for Trivy)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker-compose/dockerfiles/vigia-api.dockerfile
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vigia:${{ inputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vigia:latest

      - name: Trivy (image vulnerability scan)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/vigia:${{ inputs.version }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Push Docker image
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/vigia:${{ inputs.version }}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/vigia:latest"

  deploy_service:
    name: Deploy service
    needs: publish_docker_image
    runs-on: ubuntu-latest
    steps:
      - name: Pull and restart on server (SSH)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_SERVER_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_DEPLOY_PATH }}"
            docker-compose pull vigia
            docker-compose up -d --remove-orphans vigia