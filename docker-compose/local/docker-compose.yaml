  #   ports:
  #     - 4200:80
  #   networks:
  #     - vigia-network

  # ─── MediaMTX (baixa latencia para testes) ─────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: vigia-mediamtx
    profiles: ["stream-test"]
    restart: unless-stopped
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    ports:
      # Ingest RTMP (ex.: ffmpeg -> rtmp://localhost:1936/live/cam1)
      - "1935:1935"
      # Reproducao RTSP (ex.: rtsp://localhost:8554/live/cam1)
      - "8554:8554"
      # Player WebRTC/HLS (http://localhost:8889/live/cam1)
      - "8889:8889"
      - "8888:8888"
      # ICE/UDP do WebRTC para reduzir latencia ponta-a-ponta
      - "8189:8189/udp"
      # Fallback ICE/TCP quando UDP nao fecha conexao
      - "8189:8189/tcp"
    networks:
      - vigia-network

  # ─── MONGO HISTÓRICO (com autenticação) - usado pelo STH Comet ────────────────
  mongo-db-historical:
    image: mongo:4.4
    container_name: fiware-mongo-historical
    restart: always
    hostname: mongo-db-historical
    profiles: ["fiware"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    command: ["mongod", "--nojournal", "--auth"]
    ports:
      - "27017:27017"  # <-- Exposto externamente, se necessário
    volumes:
      - ./docker-compose/mongo-db-historical/data:/data/db
    networks:
      - vigia-network

  # ─── MONGO INTERNO (sem autenticação) - usado pelo Orion e IoT Agent ────────────
  mongo-db-internal:
    image: mongo:4.4
    container_name: fiware-mongo-internal
    restart: always
    hostname: mongo-db-internal
    command: ["mongod", "--nojournal"]
    profiles: ["fiware"]
    ports:
      - "27067:27017"
    # Nenhuma porta mapeada para o host
    volumes:
      - ./docker-compose/mongo-db-internal/data:/data/db

    networks:
      - vigia-network

  # ─── ORION – Context Broker (usando mongo-db-internal, sem auth) ────────────────
  orion:
    image: fiware/orion:3.11.0
    restart: always
    container_name: fiware-orion
    hostname: orion
    profiles: ["fiware"]
    depends_on:
      - mongo-db-historical
    ports:
      - "1026:1026"
    command: >
      -dbhost mongo-db-historical
      -dbuser admin
      -dbpwd admin123
      -dbAuthDb admin
      -corsOrigin __ALL
      -corsMaxAge 600
    
    networks:
      - vigia-network

  # ─── STH Comet – Armazena dados históricos (usando mongo-db-historical, com auth) ──────
  fiware-sth-comet:
    image: telefonicaiot/fiware-sth-comet
    restart: always
    container_name: fiware-sth-comet
    hostname: sth-comet
    profiles: ["fiware"]
    depends_on:
      - mongo-db-historical
    ports:
      - "8666:8666"
    environment:
      - STH_HOST=0.0.0.0
      - STH_PORT=8666
      - DB_PREFIX=sth_
      - DB_URI=mongo-db-historical:27017  # <-- Aponte para o serviço renomeado
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - DB_AUTH_SOURCE=admin
      - LOGOPS_LEVEL=DEBUG

    networks:
      - vigia-network
  # ─── MQTT BROKER – Mosquitto ────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:latest
    restart: always
    container_name: fiware-mosquitto
    profiles: ["fiware"]
    hostname: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker-compose/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    
    networks:
      - vigia-network

  # ─── IOT AGENT – UL (usando mongo-db-internal, sem auth) ──────────────────────
  iot-agent:
    image: fiware/iotagent-ul:latest
    restart: always
    container_name: fiware-iot-agent
    hostname: iot-agent
    profiles: ["fiware"]
    depends_on:
      - mongo-db-internal
      - mosquitto
    expose:
      - "4041"
    ports:
      - "4041:4041"
    environment:
      # --- Conexão ao Orion ---
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026
      - IOTA_CB_NGSI_VERSION=v2

      # --- Porta do IoT Agent ---
      - IOTA_NORTH_PORT=4041

      # --- Registro no Mongo (sem auth) ---
      - IOTA_MONGO_HOST=mongo-db-internal
      - IOTA_MONGO_PORT=27017

      # --- MQTT ---
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883

      # --- Outros ajustes ---
      - IOTA_LOG_LEVEL=DEBUG
      - IOTA_TIMESTAMP=true
      - IOTA_AUTOCAST=true
      - IOTA_PROVIDER_URL=http://iot-agent:4041

    networks:
      - vigia-network

networks:
  vigia-network:
    driver: bridge