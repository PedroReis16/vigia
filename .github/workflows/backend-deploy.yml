name: Backend API Deploy

run-name: "${{ inputs.api_selection }} - v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      api_selection:
        description: "Serviço backend a compilar e publicar"
        required: true
        type: choice
        options:
          - Vigia API
          - Vigia Stream
      version:
        description: "Version to deploy"
        required: true

permissions:
  contents: read

jobs:
  validate_environment:
    name: Deployment context
    runs-on: ubuntu-latest
    outputs:
      go_package: ${{ steps.deployment_vars.outputs.go_package }}
      binary_name: ${{ steps.deployment_vars.outputs.binary_name }}
      dockerfile_path: ${{ steps.deployment_vars.outputs.dockerfile_path }}
      image_name: ${{ steps.deployment_vars.outputs.image_name }}
      compose_service: ${{ steps.deployment_vars.outputs.compose_service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Map selection to build and deploy paths
        id: deployment_vars
        shell: bash
        run: |
          SLUG="${{ inputs.api_selection }}"

          case "$SLUG" in
            "Vigia API")
              GO_PACKAGE="./cmd/vigia-api"
              BINARY_NAME="vigia-api"
              DOCKERFILE_PATH="docker-compose/dockerfiles/vigia-api.dockerfile"
              IMAGE_NAME="vigia"
              COMPOSE_SERVICE="vigia"
              ;;
            "Vigia Stream")
              GO_PACKAGE="./cmd/vigia-stream"
              BINARY_NAME="vigia-stream"
              DOCKERFILE_PATH="docker-compose/dockerfiles/vigia-stream.dockerfile"
              IMAGE_NAME="vigia-stream"
              COMPOSE_SERVICE="vigia-stream"
              ;;
            *)
              echo "Seleção inválida: $SLUG"
              exit 1
              ;;
          esac

          echo "go_package=$GO_PACKAGE" >> "$GITHUB_OUTPUT"
          echo "binary_name=$BINARY_NAME" >> "$GITHUB_OUTPUT"
          echo "dockerfile_path=$DOCKERFILE_PATH" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "compose_service=$COMPOSE_SERVICE" >> "$GITHUB_OUTPUT"

  security:
    name: Security (SAST, SCA, secrets, Dockerfile)
    needs: validate_environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ needs.validate_environment.outputs.dockerfile_path }}
          failure-threshold: error

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: backend/go.sum

      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      # Só o pacote main do serviço escolhido (e subpacotes). ./... varre o módulo inteiro e mistura vigia-api, stream, bootstrap, etc.
      - name: Gosec (Go SAST)
        working-directory: backend
        env:
          GO_PACKAGE: ${{ needs.validate_environment.outputs.go_package }}
        run: gosec "${GO_PACKAGE}/..."

      - name: Govulncheck (dependency vulnerabilities)
        working-directory: backend
        env:
          GO_PACKAGE: ${{ needs.validate_environment.outputs.go_package }}
        run: govulncheck "${GO_PACKAGE}/..."

  project_build:
    name: Project compilation
    needs: [validate_environment, security]
    runs-on: ubuntu-latest
    env:
      GO_PACKAGE: ${{ needs.validate_environment.outputs.go_package }}
      BINARY_NAME: ${{ needs.validate_environment.outputs.binary_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: backend/go.sum

      - name: Build Go binary
        working-directory: backend
        run: go build -trimpath -ldflags="-s -w" -o "$BINARY_NAME" "$GO_PACKAGE"

  publish_docker_image:
    name: Publish Docker image
    needs: [validate_environment, security, project_build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (load for Trivy)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ needs.validate_environment.outputs.dockerfile_path }}
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ needs.validate_environment.outputs.image_name }}:${{ inputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ needs.validate_environment.outputs.image_name }}:latest

      - name: Trivy (image vulnerability scan)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/${{ needs.validate_environment.outputs.image_name }}:${{ inputs.version }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Push Docker image
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/${{ needs.validate_environment.outputs.image_name }}:${{ inputs.version }}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/${{ needs.validate_environment.outputs.image_name }}:latest"

  deploy_service:
    name: Deploy service
    needs: [validate_environment, publish_docker_image]
    runs-on: ubuntu-latest
    steps:
      - name: Pull and restart on server (SSH)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_SERVER_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.EC2_DEPLOY_PATH }}"
            docker-compose pull ${{ needs.validate_environment.outputs.compose_service }}
            docker-compose up -d --remove-orphans ${{ needs.validate_environment.outputs.compose_service }}
