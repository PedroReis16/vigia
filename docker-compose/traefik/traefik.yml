api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: vigia-network

certificatesResolvers:
  letsencrypt:
    acme:
      email: pedrohsreis10@gmail.com
      storage: /certificates/acme.json
      httpChallenge:
        entryPoint: web
