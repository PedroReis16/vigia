services:
  gerenciamento-dispositivos:
    image: pedroreis16/gerenciamento-dispositivos:latest
    container_name: gerenciamento-dispositivos
    restart: always
    platform: "linux/arm64"
    labels:
      - "org.label-schema.group=vigia"
      - "service_name=gerenciamento-dispositivos"
      - "traefik.enable=true"
      - "traefik.http.routers.gerenciamento-dispositivos.rule=Host(`www.vigia-deteccoes.duckdns.org`) && PathPrefix(`/gerenciamento-dispositivos`)"
      - "traefik.http.routers.gerenciamento-dispositivos.entrypoints=websecure"
      - "traefik.http.routers.gerenciamento-dispositivos.tls.certresolver=letsencrypt"
      - "traefik.http.services.gerenciamento-dispositivos.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowmethods=*"
      - "traefik.http.middlewares.cors.headers.accessControlAllowHeaders=*"
      - "traefik.http.middlewares.cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.cors.headers.accesscontrolmaxage=100"
      - "traefik.http.middlewares.cors.headers.addvaryheader=true"
      - "traefik.http.routers.gerenciamento-dispositivos.middlewares=cors"
    networks:
      - vigia-network

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./certificates:/certificates

    networks:
      - vigia-network
networks:
  vigia-network:
    driver: bridge
    external: true
