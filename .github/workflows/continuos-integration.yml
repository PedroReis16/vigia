name: Solution Continuous Integration

on:
    pull_request:
        branches:
            - develop
            - master

permissions:
    contents: read
    pull-requests: read

jobs:
    secrets_scan:
        name: Secrets scan (Gitleaks)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            - name: Secrets scan (Gitleaks)
                uses: gitleaks/gitleaks-action@v2
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
