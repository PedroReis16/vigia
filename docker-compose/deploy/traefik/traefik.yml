api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
  mqtt:
    address: ":1883"

providers:
  docker:
    exposedByDefault: false
    network: vigia-network
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: vigiadeteccoes@gmail.com
      storage: /certificates/acme.json
      httpChallenge:
        entryPoint: web