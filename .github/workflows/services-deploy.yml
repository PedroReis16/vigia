name: Services Deploy

on:
  workflow_dispatch:
    inputs:
      service_selection:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - Vigia API
          - Vigia Stream
          - Vigia Frontend
          - Vigia Fall Detection
      version:
        description: "Version to deploy"
        required: true

permissions:
  contents: write
  pull-requests: read
  security-events: write

# Impede dois deploys simultâneos do mesmo serviço
concurrency:
  group: deploy-${{ inputs.service_selection }}-${{ inputs.version }}
  cancel-in-progress: false   # false = espera o anterior terminar, não cancela

#TODO: Acertar a branch de destino após os testes
jobs:
  # ─────────────────────────────────────────────
  # 1. VALIDAÇÃO DE AMBIENTE E PRÉ-CONDIÇÕES
  # Resolve as variáveis do serviço selecionado e
  # valida changelog + unicidade da tag antes de
  # qualquer build ou scan.
  # ─────────────────────────────────────────────
  validate_environment:
    name: Set up deployment variables
    runs-on: ubuntu-latest
    if: github.ref_name == 'chore/project-pipeline' 
    outputs:
      # Metadados do serviço — consumidos por todos os jobs seguintes
      service_type:     ${{ steps.service_vars.outputs.service_type }}
      service_path:     ${{ steps.service_vars.outputs.service_path }}
      dockerfile_path:  ${{ steps.service_vars.outputs.dockerfile_path }}
      image_name:       ${{ steps.service_vars.outputs.image_name }}
      artifact_name:    ${{ steps.service_vars.outputs.artifact_name }}
      compose_service:  ${{ steps.service_vars.outputs.compose_service }}
      has_docker:       ${{ steps.service_vars.outputs.has_docker }}
      # Metadados de release
      tag_name:         ${{ steps.release_vars.outputs.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up deployment variables
        id: deployment_vars
        shell: bash
        run: |
          SERVICE_NAME="${{ inputs.service_selection }}"
          VERSION="${{ inputs.version }}"
          TAG_NAME="${SERVICE_NAME}@${VERSION}"
      - name: Resolve service variables
        id: service_vars
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_NAME="${{ inputs.service_selection }}"

          case "${SERVICE_NAME}" in
            "Vigia API")
              SERVICE_TYPE="go"
              SERVICE_PATH="vigia-services/apps/vigia-api"
              DOCKERFILE_PATH="docker-compose/dockerfiles/vigia-api.dockerfile"
              IMAGE_NAME="vigia-api"
              ARTIFACT_NAME="vigia-api"
              COMPOSE_SERVICE="vigia"
              HAS_DOCKER="true"
              ;;
            "Vigia Stream")
              SERVICE_TYPE="go"
              SERVICE_PATH="vigia-services/apps/vigia-stream"
              DOCKERFILE_PATH="docker-compose/dockerfiles/vigia-stream.dockerfile"
              IMAGE_NAME="vigia-stream"
              ARTIFACT_NAME="vigia-stream"
              COMPOSE_SERVICE="vigia-stream"
              HAS_DOCKER="true"
              ;;
            "Vigia Fall Detection")
              SERVICE_TYPE="python"
              SERVICE_PATH="fall-detection"
              DOCKERFILE_PATH="docker-compose/dockerfiles/fall-detection.dockerfile"
              IMAGE_NAME="fall-detection"
              ARTIFACT_NAME="fall-detection"
              COMPOSE_SERVICE=""
              HAS_DOCKER="true"
              ;;
            "Vigia Frontend")
              SERVICE_TYPE="node"
              SERVICE_PATH="frontend"
              DOCKERFILE_PATH="docker-compose/dockerfiles/vigia-frontend.dockerfile"
              IMAGE_NAME="vigia-frontend"
              ARTIFACT_NAME="vigia-frontend"
              COMPOSE_SERVICE="vigia-frontend"
              HAS_DOCKER="true"
              ;;
            *)
              echo "::error::Serviço desconhecido: ${{ inputs.service_selection }}"
              exit 1
              ;;
          esac
          echo "service_type=$SERVICE_TYPE"       >> "$GITHUB_OUTPUT"
          echo "service_path=$SERVICE_PATH"       >> "$GITHUB_OUTPUT"
          echo "dockerfile_path=$DOCKERFILE_PATH" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME"           >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME"     >> "$GITHUB_OUTPUT"
          echo "compose_service=$COMPOSE_SERVICE" >> "$GITHUB_OUTPUT"
          echo "has_docker=$HAS_DOCKER"           >> "$GITHUB_OUTPUT"

      # ── Metadados de release ─────────────────────────────────
      - name: Definir variáveis de release
        id: release_vars
        shell: bash
        run: |
          TAG_NAME="${{ inputs.service_selection }}@${{ inputs.version }}"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "Tag de release: $TAG_NAME"

      - name: Validar CHANGELOG
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ inputs.version }}"
          SERVICE_PATH="${{ steps.service_vars.outputs.service_path }}"
          CHANGELOG_PATH="./${SERVICE_PATH}/CHANGELOG.md"

          echo "Verificando versão '$VERSION' em '$CHANGELOG_PATH'..."

          if [ ! -f "$CHANGELOG_PATH" ]; then
            echo "::error::Arquivo $CHANGELOG_PATH não encontrado."
            echo "Crie o CHANGELOG.md em '$SERVICE_PATH' antes de fazer o release."
            exit 1
          fi

          # Aceita os dois formatos mais comuns:
          #   ## [1.2.3] — Keep a Changelog
          #   # **[1.2.3]** — formato customizado
          if grep -qE "^#{1,2} \*?\*?\[${VERSION}\]" "$CHANGELOG_PATH"; then
            echo "✓ Versão $VERSION encontrada no CHANGELOG."
          else
            echo "::error::Versão $VERSION NÃO encontrada em $CHANGELOG_PATH."
            echo "Adicione a seção '## [$VERSION]' ao CHANGELOG antes do release."
            exit 1
          fi

      # ── Validação 2: unicidade da tag ────────────────────────
      # Impede sobrescrever um release que já foi publicado.
      - name: Validar unicidade da tag de release
        shell: bash
        run: |
          set -euo pipefail
 
          TAG_NAME="${{ steps.release_vars.outputs.tag_name }}"
          echo "Verificando se a tag '$TAG_NAME' já existe..."
 
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "::error::A tag '$TAG_NAME' já existe no repositório."
            echo "Use uma versão diferente ou delete a tag existente manualmente."
            exit 1
          fi
 
          echo "✓ Tag '$TAG_NAME' está disponível."

  
  # ─────────────────────────────────────────────
  # 2. SEGURANÇA
  # SAST, SCA e lint do Dockerfile — roda em
  # paralelo com o build para economizar tempo.
  # ─────────────────────────────────────────────
  security:
    name: Segurança — SAST, SCA, secrets, Dockerfile
    needs: validate_environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
      # ── Dockerfile lint ──────────────────────────────────────
      - name: Lint do Dockerfile
        if: needs.validate_environment.outputs.has_docker == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ needs.validate_environment.outputs.dockerfile_path }}
          failure-threshold: error
 
      # ── Node — npm audit ─────────────────────────────────────
      - name: Set up Node.js
        if: needs.validate_environment.outputs.service_type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ needs.validate_environment.outputs.service_path }}/package-lock.json
 
      - name: Node - install dependencies
        if: needs.validate_environment.outputs.service_type == 'node'
        working-directory: ${{ needs.validate_environment.outputs.service_path }}
        run: npm ci
 
      - name: Node - dependency vulnerabilities
        if: needs.validate_environment.outputs.service_type == 'node'
        working-directory: ${{ needs.validate_environment.outputs.service_path }}
        run: npm audit --audit-level=critical --omit=dev
 
      # ── Python — bandit + pip-audit ──────────────────────────
      - name: Set up Python
        if: needs.validate_environment.outputs.service_type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            ${{ needs.validate_environment.outputs.service_path }}/requirements.txt
            ${{ needs.validate_environment.outputs.service_path }}/requirements-debug.txt
 
      - name: Python - install dependencies
        if: needs.validate_environment.outputs.service_type == 'python'
        working-directory: ${{ needs.validate_environment.outputs.service_path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit
 
      - name: Python - SAST (bandit)
        if: needs.validate_environment.outputs.service_type == 'python'
        working-directory: ${{ needs.validate_environment.outputs.service_path }}
        run: bandit -r src/app -ll
 
      - name: Python - dependency vulnerabilities (pip-audit)
        if: needs.validate_environment.outputs.service_type == 'python'
        working-directory: ${{ needs.validate_environment.outputs.service_path }}
        run: pip-audit --strict
 
      # ── Go — gosec + govulncheck ─────────────────────────────
      - name: Set up Go
        if: needs.validate_environment.outputs.service_type == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ (needs.validate_environment.outputs.service_path != '' && needs.validate_environment.outputs.service_path) || (inputs.service_selection == 'Vigia API' && 'vigia-services/apps/vigia-api' || 'vigia-services/apps/vigia-stream') }}/go.mod
          cache-dependency-path: ${{ (needs.validate_environment.outputs.service_path != '' && needs.validate_environment.outputs.service_path) || (inputs.service_selection == 'Vigia API' && 'vigia-services/apps/vigia-api' || 'vigia-services/apps/vigia-stream') }}/go.sum
 
      - name: Go - install security tools
        if: needs.validate_environment.outputs.service_type == 'go'
        env:
          GOWORK: off
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
 
      - name: Go - SAST (gosec)
        if: needs.validate_environment.outputs.service_type == 'go'
        shell: bash
        env:
          SERVICE_PATH: ${{ (needs.validate_environment.outputs.service_path != '' && needs.validate_environment.outputs.service_path) || (inputs.service_selection == 'Vigia API' && 'vigia-services/apps/vigia-api' || 'vigia-services/apps/vigia-stream') }}
          GOWORK: off
        run: |
          set -euo pipefail
          test -d "$SERVICE_PATH"
          cd "$SERVICE_PATH"
          gosec ./...
 
      - name: Go - dependency vulnerabilities (govulncheck)
        if: needs.validate_environment.outputs.service_type == 'go'
        shell: bash
        env:
          SERVICE_PATH: ${{ (needs.validate_environment.outputs.service_path != '' && needs.validate_environment.outputs.service_path) || (inputs.service_selection == 'Vigia API' && 'vigia-services/apps/vigia-api' || 'vigia-services/apps/vigia-stream') }}
          GOWORK: off
        run: |
          set -euo pipefail
          test -d "$SERVICE_PATH"
          cd "$SERVICE_PATH"
          govulncheck ./...
 

 
  # ─────────────────────────────────────────────
  # 3. BUILD DO ARTEFATO
  # Compila o projeto e exporta o artefato para
  # o job de publicação Docker.
  # Roda em paralelo com security.
  # ─────────────────────────────────────────────
  build:
    name: Build — ${{ inputs.service_selection }}
    needs: [validate_environment,security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      # ── Node — ng build ──────────────────────────────────────
      - name: Set up Node.js
        if: needs.validate_environment.outputs.service_type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ needs.validate_environment.outputs.service_path }}/package-lock.json
 
      - name: Node - install dependencies
        if: needs.validate_environment.outputs.service_type == 'node'
        working-directory: ${{ needs.validate_environment.outputs.service_path }}
        run: npm ci
 
      - name: Node - build
        if: needs.validate_environment.outputs.service_type == 'node'
        working-directory: ${{ needs.validate_environment.outputs.service_path }}
        run: npm run build -- --configuration=production
 
      - name: Node - exportar dist
        if: needs.validate_environment.outputs.service_type == 'node'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ needs.validate_environment.outputs.artifact_name }}-${{ inputs.version }}
          path: ${{ needs.validate_environment.outputs.service_path }}/dist/
          retention-days: 1
 
      # ── Python — sem compilação, só valida a instalação ─────
      # O build real acontece dentro do Docker (pip install no Dockerfile).
      # Validamos aqui que o requirements.txt está íntegro.
      - name: Set up Python
        if: needs.validate_environment.outputs.service_type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
 
      - name: Python - validar requirements
        if: needs.validate_environment.outputs.service_type == 'python'
        working-directory: ${{ needs.validate_environment.outputs.service_path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --dry-run
 
      # ── Go — compilar binário estático ──────────────────────
      - name: Set up Go
        if: needs.validate_environment.outputs.service_type == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ (needs.validate_environment.outputs.service_path != '' && needs.validate_environment.outputs.service_path) || (inputs.service_selection == 'Vigia API' && 'vigia-services/apps/vigia-api' || 'vigia-services/apps/vigia-stream') }}/go.mod
          cache-dependency-path: ${{ (needs.validate_environment.outputs.service_path != '' && needs.validate_environment.outputs.service_path) || (inputs.service_selection == 'Vigia API' && 'vigia-services/apps/vigia-api' || 'vigia-services/apps/vigia-stream') }}/go.sum
 
      - name: Go - build
        if: needs.validate_environment.outputs.service_type == 'go'
        env:
          SERVICE_PATH: ${{ (needs.validate_environment.outputs.service_path != '' && needs.validate_environment.outputs.service_path) || (inputs.service_selection == 'Vigia API' && 'vigia-services/apps/vigia-api' || 'vigia-services/apps/vigia-stream') }}
          GOWORK: off
        working-directory: ${{ (needs.validate_environment.outputs.service_path != '' && needs.validate_environment.outputs.service_path) || (inputs.service_selection == 'Vigia API' && 'vigia-services/apps/vigia-api' || 'vigia-services/apps/vigia-stream') }}
        run: |
          set -euo pipefail
          test -d .
          BINARY_NAME="${{ needs.validate_environment.outputs.artifact_name }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build \
              -trimpath \
              -ldflags="-s -w" \
              -o "$BINARY_NAME" \
              .
 
      - name: Go - exportar binário
        if: needs.validate_environment.outputs.service_type == 'go'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ needs.validate_environment.outputs.artifact_name }}-${{ inputs.version }}
          path: ${{ needs.validate_environment.outputs.service_path }}/${{ needs.validate_environment.outputs.artifact_name }}
          retention-days: 1
 
  # ─────────────────────────────────────────────
  # 4. PUBLICAÇÃO DA IMAGEM DOCKER
  # Aguarda security E build para garantir que
  # nenhuma imagem com vulnerabilidade seja
  # publicada e que o artefato está disponível.
  # ─────────────────────────────────────────────
  publish_docker_image:
    name: Publicar imagem Docker
    needs: [validate_environment, security, build]
    # vigia-bootstrap não tem imagem Docker
    if: needs.validate_environment.outputs.has_docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Baixar artefato de build
        if: needs.validate_environment.outputs.service_type != 'python'
        uses: actions/download-artifact@v4
        with:
          name: build-${{ needs.validate_environment.outputs.artifact_name }}-${{ inputs.version }}
          path: ./artifact
 
      # Binários Go precisam de permissão de execução após o download
      - name: Ajustar permissões do artefato (Go)
        if: needs.validate_environment.outputs.service_type == 'go'
        run: chmod +x ./artifact/${{ needs.validate_environment.outputs.artifact_name }}
 
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
 
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      # Build local primeiro — o Trivy precisa da imagem antes do push
      - name: Build local da imagem (para scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ needs.validate_environment.outputs.dockerfile_path }}
          load: true
          push: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ needs.validate_environment.outputs.image_name }}:${{ inputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ needs.validate_environment.outputs.image_name }}:latest
          build-args: |
            VERSION=${{ inputs.version }}
 
      - name: Trivy — scan de vulnerabilidades da imagem
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/${{ needs.validate_environment.outputs.image_name }}:${{ inputs.version }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif
 
      - name: Publicar relatório Trivy no GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
 
      # Só publica depois que Trivy aprova
      - name: Push da imagem
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/${{ needs.validate_environment.outputs.image_name }}:${{ inputs.version }}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/${{ needs.validate_environment.outputs.image_name }}:latest"
 
  # ─────────────────────────────────────────────
  # 5. DEPLOY NA VM
  # Aciona somente após a imagem ser publicada
  # (ou após build+security para serviços sem Docker).
  # O environment do GitHub pode exigir aprovação
  # manual para production — configure em:
  # Settings → Environments → production → Required reviewers
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy — production
    needs: [validate_environment, publish_docker_image]
    if: |
      always() &&
      needs.validate_environment.result == 'success' &&
      needs.validate_environment.outputs.compose_service != '' &&
      needs.publish_docker_image.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.EC2_SERVER_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
 
            SERVICE="${{ needs.validate_environment.outputs.compose_service }}"
            VERSION="${{ inputs.version }}"
            DEPLOY_PATH="${{ secrets.EC2_DEPLOY_PATH }}"
 
            echo "==> Deploy de '$SERVICE' v$VERSION em production"
            cd "$DEPLOY_PATH"
 
            # Atualiza a variável de versão no .env se o Compose usar IMAGE_TAG
            if [ -f .env ] && grep -q "^IMAGE_TAG=" .env; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$VERSION/" .env
              echo "==> IMAGE_TAG atualizado para $VERSION"
            fi
 
            echo "==> Baixando nova imagem..."
            docker compose pull "$SERVICE"
 
            echo "==> Subindo nova versão..."
            docker compose up -d --remove-orphans "$SERVICE"
 
            echo "==> Aguardando estabilização (15s)..."
            sleep 15
 
            # Healthcheck: confirma que o container está running
            STATUS=$(docker inspect \
              --format='{{.State.Status}}' \
              "$(docker compose ps -q "$SERVICE")" 2>/dev/null || echo "not_found")
 
            echo "Status do container: $STATUS"
 
            if [[ "$STATUS" != "running" ]]; then
              echo "::error::Container '$SERVICE' não está running após o deploy."
              echo "==> Últimas 50 linhas de log:"
              docker compose logs --tail=50 "$SERVICE"
              exit 1
            fi
 
            echo "==> Limpando imagens obsoletas..."
            docker image prune -f
 
            echo "==> Deploy de '$SERVICE' v$VERSION concluído com sucesso."
 
  # ─────────────────────────────────────────────
  # 6. TAG DE RELEASE
  # Cria a git tag no repositório após deploy
  # bem-sucedido. Serve como registro imutável
  # de que aquela versão foi para produção.
  # ─────────────────────────────────────────────
  tag_release:
    name: Criar tag de release
    needs: [validate_environment, deploy]
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Criar e publicar tag
        env:
          TAG_NAME: ${{ needs.validate_environment.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
 
          git tag -a "$TAG_NAME" \
            -m "Release ${{ inputs.service_selection }} v${{ inputs.version }} → production"
 
          git push origin "$TAG_NAME"
 
          echo "✓ Tag '$TAG_NAME' criada e publicada."