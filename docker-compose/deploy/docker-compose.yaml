services:
  # ─── VIGIA ────────────────────────────────────────────────────────────────
  vigia:
    image: pedroreis16/vigia-api:latest
    container_name: vigia-api
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vigia.rule=Host(`www.vigia-deteccoes.duckdns.org`) && PathPrefix(`/api`)"
      - "traefik.http.routers.vigia.entrypoints=websecure"
      - "traefik.http.routers.vigia.tls.certresolver=letsencrypt"
      - "traefik.http.services.vigia.loadbalancer.server.port=8000"
      - "traefik.http.routers.vigia.middlewares=strip-vigia,cors@file"
      - "traefik.http.middlewares.strip-vigia.stripprefix.prefixes=/api"
    networks:
      - vigia-network

  # ─── TRAEFIK ──────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
    command:
      - --configFile=/etc/traefik/traefik.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./certificates:/certificates
    networks:
      - vigia-network

  # ─── MONGO HISTÓRICO (STH-Comet) ─────────────────────────────────────────
  mongo-db-historical:
    image: mongo:6.0
    container_name: fiware-mongo-historical
    restart: always
    hostname: mongo-db-historical
    profiles: ["fiware"]
    ports:
      - "27077:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    command: ["mongod", "--nojournal", "--auth"] 
    volumes:
      - mongo-historical-data:/data/db
    networks:
      - vigia-network

  # ─── MONGO INTERNO (Orion + IoT Agent) ────────────────────────────────────
  mongo-db-internal:
    image: mongo:6.0
    container_name: fiware-mongo-internal
    restart: always
    hostname: mongo-db-internal
    ports:
      - "27067:27017"
    profiles: ["fiware"]
    command: ["mongod", "--nojournal"]
    volumes:
      - mongo-internal-data:/data/db
    networks:
      - vigia-network

  # ─── ORION ────────────────────────────────────────────────────────────────
  orion:
    image: fiware/orion:3.11.0
    restart: always
    container_name: fiware-orion
    hostname: orion
    profiles: ["fiware"]
    depends_on:
      - mongo-db-historical
    expose:
      - "1026"
    command: >
      -dbhost mongo-db-historical
      -dbuser admin
      -dbpwd admin123
      -dbAuthDb admin
      -corsOrigin __ALL
      -corsMaxAge 600
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orion.rule=(Host(`vigia-deteccoes.duckdns.org`) || Host(`www.vigia-deteccoes.duckdns.org`)) && PathPrefix(`/fiware/orion`)"
      - "traefik.http.routers.orion.entrypoints=websecure"
      - "traefik.http.routers.orion.tls=true"
      - "traefik.http.routers.orion.tls.certresolver=letsencrypt"
      - "traefik.http.services.orion.loadbalancer.server.port=1026"
      - "traefik.http.routers.orion.middlewares=strip-orion,cors@file"
      - "traefik.http.middlewares.strip-orion.stripprefix.prefixes=/fiware/orion"
    networks:
      - vigia-network

  # ─── STH-COMET ────────────────────────────────────────────────────────────
  fiware-sth-comet:
    image: telefonicaiot/fiware-sth-comet
    restart: always
    container_name: fiware-sth-comet
    hostname: sth-comet
    profiles: ["fiware"]
    depends_on:
      - mongo-db-historical
    expose:
      - "8666"
    environment:
      - STH_HOST=0.0.0.0
      - STH_PORT=8666
      - DB_PREFIX=sth_
      - DB_URI=mongo-db-historical:27017
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - DB_AUTH_SOURCE=admin
      - LOGOPS_LEVEL=DEBUG
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sth.rule=(Host(`vigia-deteccoes.duckdns.org`) || Host(`www.vigia-deteccoes.duckdns.org`)) && PathPrefix(`/fiware/sth-comet`)"
      - "traefik.http.routers.sth.entrypoints=websecure"
      - "traefik.http.routers.sth.tls=true"
      - "traefik.http.routers.sth.tls.certresolver=letsencrypt"
      - "traefik.http.services.sth.loadbalancer.server.port=8666"
      - "traefik.http.routers.sth.middlewares=strip-sth,cors@file"
      - "traefik.http.middlewares.strip-sth.stripprefix.prefixes=/fiware/sth-comet"
    networks:
      - vigia-network

  # ─── IOT AGENT ────────────────────────────────────────────────────────────
  iot-agent:
    image: fiware/iotagent-ul:latest
    restart: always
    container_name: fiware-iot-agent
    hostname: iot-agent
    profiles: ["fiware"]
    depends_on:
      - mongo-db-internal
      - mosquitto
    expose:
      - "4041"
    environment:
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026
      - IOTA_CB_NGSI_VERSION=v2
      - IOTA_NORTH_PORT=4041
      - IOTA_MONGO_HOST=mongo-db-internal
      - IOTA_MONGO_PORT=27017
      - IOTA_MQTT_HOST=mosquitto
      - IOTA_MQTT_PORT=1883
      - IOTA_LOG_LEVEL=DEBUG
      - IOTA_TIMESTAMP=true
      - IOTA_AUTOCAST=true
      - IOTA_PROVIDER_URL=http://iot-agent:4041
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iot.rule=(Host(`vigia-deteccoes.duckdns.org`) || Host(`www.vigia-deteccoes.duckdns.org`)) && PathPrefix(`/fiware/iot-agent`)"
      - "traefik.http.routers.iot.entrypoints=websecure"
      - "traefik.http.routers.iot.tls=true"
      - "traefik.http.routers.iot.tls.certresolver=letsencrypt"
      - "traefik.http.services.iot.loadbalancer.server.port=4041"
      - "traefik.http.routers.iot.middlewares=strip-iot,cors@file"
      - "traefik.http.middlewares.strip-iot.stripprefix.prefixes=/fiware/iot-agent"

    networks:
      - vigia-network

  # ─── MOSQUITTO (MQTT) ─────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:latest
    restart: always
    container_name: fiware-mosquitto
    hostname: mosquitto
    profiles: ["fiware"]
    expose:
      - "1883"
      - "9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mqttws.rule=(Host(`vigia-deteccoes.duckdns.org`) || Host(`www.vigia-deteccoes.duckdns.org`)) && PathPrefix(`/fiware/mosquitto`)"
      - "traefik.http.routers.mqttws.entrypoints=websecure"
      - "traefik.http.routers.mqttws.tls=true"
      - "traefik.http.routers.mqttws.tls.certresolver=letsencrypt"
      - "traefik.http.services.mqttws.loadbalancer.server.port=9001"
      - "traefik.http.middlewares.strip-notifications.stripprefix.prefixes=/fiware/mosquitto"
      - "traefik.http.routers.mqttws.middlewares=strip-notifications,cors@file"
    networks:
      - vigia-network

#  ──  MEDIAMTX (VIDEO STREAMING) ───────────────────────────────────────────────────

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: vigia-mediamtx
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Playback via HTTPS
      - "traefik.http.routers.mediamtx-play.rule=(Host(`www.vigia-deteccoes.duckdns.org`) || Host(`vigia-deteccoes.duckdns.org`)) && PathPrefix(`/live`)"
      - "traefik.http.routers.mediamtx-play.entrypoints=websecure"
      - "traefik.http.routers.mediamtx-play.tls=true"
      - "traefik.http.routers.mediamtx-play.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mediamtx-play.priority=100"
      - "traefik.http.services.mediamtx-play.loadbalancer.server.port=8889"

      # Ingest RTMPS em 443 (host separado recomendado)
      - "traefik.tcp.routers.mediamtx-ingest.rule=HostSNI(`ingest-vigia-deteccoes.duckdns.org`)"
      - "traefik.tcp.routers.mediamtx-ingest.entrypoints=websecure"
      - "traefik.tcp.routers.mediamtx-ingest.tls=true"
      - "traefik.tcp.routers.mediamtx-ingest.tls.certresolver=letsencrypt"
      - "traefik.tcp.services.mediamtx-ingest.loadbalancer.server.port=1935"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - vigia-network

volumes:
  mongo-historical-data:
  mongo-internal-data:

networks:
  vigia-network:
    driver: bridge
    external: true