name: Solution Continuous Integration

on:
  pull_request:
    branches:
      - develop
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  # ─────────────────────────────────────────────
  # 1. DETECÇÃO DE MUDANÇAS
  # Constrói uma matriz dinâmica com apenas os projetos
  # que tiveram arquivos alterados nesta PR.
  # ─────────────────────────────────────────────
  detect_changes:
    name: Detect changed projects
    runs-on: ubuntu-latest
    outputs:
      projects_matrix: ${{ steps.compute_matrix.outputs.projects_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'docker-compose/dockerfiles/vigia-frontend.dockerfile'
            fall_detection:
              - 'fall-detection/**'
              - 'docker-compose/dockerfiles/fall-detection.dockerfile'
            vigia_api:
              - 'vigia-services/apps/vigia-api/**'
              - 'docker-compose/dockerfiles/vigia-api.dockerfile'
            vigia_stream:
              - 'vigia-services/apps/vigia-stream/**'
              - 'docker-compose/dockerfiles/vigia-stream.dockerfile'
            vigia_bootstrap:
              - 'vigia-services/apps/vigia-bootstrap/**'
            vigia_shared:
              - 'vigia-services/pkg/shared/**'
            vigia_common:
              - 'vigia-services/go.work'
              - 'vigia-services/go.work.sum'
              - 'vigia-services/Makefile'

      - name: Build projects matrix
        id: compute_matrix
        shell: bash
        run: |
          set -euo pipefail
          PROJECTS='[]'

          if [[ "${{ steps.filter.outputs.frontend }}" == "true" ]]; then
            PROJECTS=$(jq -c '. + [{
              "name":       "frontend",
              "type":       "node",
              "path":       "frontend",
              "dockerfile": "docker-compose/dockerfiles/vigia-frontend.dockerfile",
              "has_docker": "true"
            }]' <<< "$PROJECTS")
          fi

          if [[ "${{ steps.filter.outputs.fall_detection }}" == "true" ]]; then
            PROJECTS=$(jq -c '. + [{
              "name":       "fall-detection",
              "type":       "python",
              "path":       "fall-detection",
              "dockerfile": "docker-compose/dockerfiles/fall-detection.dockerfile",
              "has_docker": "true"
            }]' <<< "$PROJECTS")
          fi

          # Variáveis auxiliares para deixar as condições legíveis
          VIGIA_API_CHANGED="${{ steps.filter.outputs.vigia_api }}"
          VIGIA_STREAM_CHANGED="${{ steps.filter.outputs.vigia_stream }}"
          VIGIA_BOOTSTRAP_CHANGED="${{ steps.filter.outputs.vigia_bootstrap }}"
          SHARED_CHANGED="${{ steps.filter.outputs.vigia_shared }}"
          COMMON_CHANGED="${{ steps.filter.outputs.vigia_common }}"

          # vigia-api entra se o próprio app, o pacote shared ou os arquivos
          # comuns do workspace Go foram alterados.
          if [[ "$VIGIA_API_CHANGED" == "true" || "$SHARED_CHANGED" == "true" || "$COMMON_CHANGED" == "true" ]]; then
            PROJECTS=$(jq -c '. + [{
              "name":       "vigia-api",
              "type":       "go",
              "path":       "vigia-services/apps/vigia-api",
              "go_mod":     "vigia-services/apps/vigia-api/go.mod",
              "go_sum":     "vigia-services/apps/vigia-api/go.sum",
              "dockerfile": "docker-compose/dockerfiles/vigia-api.dockerfile",
              "has_docker": "true"
            }]' <<< "$PROJECTS")
          fi

          if [[ "$VIGIA_STREAM_CHANGED" == "true" || "$SHARED_CHANGED" == "true" || "$COMMON_CHANGED" == "true" ]]; then
            PROJECTS=$(jq -c '. + [{
              "name":       "vigia-stream",
              "type":       "go",
              "path":       "vigia-services/apps/vigia-stream",
              "go_mod":     "vigia-services/apps/vigia-stream/go.mod",
              "go_sum":     "vigia-services/apps/vigia-stream/go.sum",
              "dockerfile": "docker-compose/dockerfiles/vigia-stream.dockerfile",
              "has_docker": "true"
            }]' <<< "$PROJECTS")
          fi

          if [[ "$VIGIA_BOOTSTRAP_CHANGED" == "true" || "$SHARED_CHANGED" == "true" || "$COMMON_CHANGED" == "true" ]]; then
            PROJECTS=$(jq -c '. + [{
              "name":       "vigia-bootstrap",
              "type":       "go",
              "path":       "vigia-services/apps/vigia-bootstrap",
              "go_mod":     "vigia-services/apps/vigia-bootstrap/go.mod",
              "go_sum":     "vigia-services/apps/vigia-bootstrap/go.sum",
              "has_docker": "false"
            }]' <<< "$PROJECTS")
          fi

          echo "projects_matrix=$PROJECTS" >> "$GITHUB_OUTPUT"
          echo "Projetos detectados: $PROJECTS"

  # ─────────────────────────────────────────────
  # 2. SCAN DE SEGREDOS
  # Roda sempre, independente de quais projetos
  # foram alterados — segredos podem aparecer em
  # qualquer arquivo do repositório.
  # ─────────────────────────────────────────────
  secrets_scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # 3. QUALIDADE POR PROJETO
  # Roda em paralelo para cada projeto detectado.
  # fail-fast: false garante que todos os projetos
  # sejam verificados mesmo se um falhar.
  # ─────────────────────────────────────────────
  project_quality:
    name: "${{ matrix.project.name }} — checks"
    needs: detect_changes
    if: needs.detect_changes.outputs.projects_matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.detect_changes.outputs.projects_matrix) }}
    steps:
      - uses: actions/checkout@v4

      # ── Setup de runtime por linguagem ──────────────────────

      - name: Set up Node.js
        if: matrix.project.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project.path }}/package-lock.json

      - name: Set up Python
        if: matrix.project.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            ${{ matrix.project.path }}/requirements.txt
            ${{ matrix.project.path }}/requirements-debug.txt

      - name: Set up Go
        if: matrix.project.type == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.project.go_mod }}
          cache-dependency-path: ${{ matrix.project.go_sum }}

      # ── Node (Angular) ───────────────────────────────────────

      - name: Node - install dependencies
        if: matrix.project.type == 'node'
        working-directory: ${{ matrix.project.path }}
        run: npm ci

      - name: Node - lint
        if: matrix.project.type == 'node'
        working-directory: ${{ matrix.project.path }}
        run: |
          if npm pkg get scripts.lint | grep -qv "null"; then
            npm run lint
          else
            echo "::notice::Sem script de lint em package.json; pulando."
          fi

      - name: Node - dependency vulnerabilities
        if: matrix.project.type == 'node'
        working-directory: ${{ matrix.project.path }}
        # --omit=dev exclui dependências de build (webpack, esbuild, etc.)
        # que frequentemente têm CVEs sem vetor real de exploração.
        # Troque por --audit-level=high se quiser cobertura total.
        run: npm audit --audit-level=critical --omit=dev

      - name: Node - tests
        if: matrix.project.type == 'node'
        working-directory: ${{ matrix.project.path }}
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Node - build verification
        if: matrix.project.type == 'node'
        working-directory: ${{ matrix.project.path }}
        run: npm run build -- --configuration=production

      # ── Python ──────────────────────────────────────────────

      - name: Python - install dependencies
        if: matrix.project.type == 'python'
        working-directory: ${{ matrix.project.path }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-debug.txt
          python -m pip install pylint bandit pip-audit

      - name: Python - lint
        if: matrix.project.type == 'python'
        working-directory: ${{ matrix.project.path }}
        run: python -m pylint src/app

      - name: Python - SAST
        if: matrix.project.type == 'python'
        working-directory: ${{ matrix.project.path }}
        # -ll = reporta apenas issues de severidade MEDIUM ou acima
        run: python -m bandit -r src/app -ll

      - name: Python - dependency vulnerabilities
        if: matrix.project.type == 'python'
        working-directory: ${{ matrix.project.path }}
        run: python -m pip_audit --strict

      - name: Python - tests
        if: matrix.project.type == 'python'
        working-directory: ${{ matrix.project.path }}
        run: python -m pytest -q

      # ── Go ──────────────────────────────────────────────────

      - name: Go - install security tools
        if: matrix.project.type == 'go'
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Go - lint
        if: matrix.project.type == 'go'
        working-directory: ${{ matrix.project.path }}
        run: golangci-lint run --timeout=5m

      - name: Go - SAST
        if: matrix.project.type == 'go'
        working-directory: ${{ matrix.project.path }}
        run: gosec ./...

      - name: Go - dependency vulnerabilities
        if: matrix.project.type == 'go'
        working-directory: ${{ matrix.project.path }}
        run: govulncheck ./...

      - name: Go - tests with coverage
        if: matrix.project.type == 'go'
        working-directory: ${{ matrix.project.path }}
        run: |
          go test ./... \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout=120s

      - name: Go - export coverage report
        if: matrix.project.type == 'go'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.project.name }}
          path: ${{ matrix.project.path }}/coverage.out
          retention-days: 7

      # ── Dockerfile (qualquer linguagem que tenha imagem) ────

      - name: Dockerfile lint
        if: matrix.project.has_docker == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.project.dockerfile }}
          failure-threshold: error

  # ─────────────────────────────────────────────
  # 4. CI GATE
  # Job único que consolida o resultado de todos
  # os outros. Configure APENAS este job como
  # "required status check" no branch protection.
  #
  # Por que um gate separado?
  # O GitHub trata jobs pulados (skipped) como
  # aprovados em required checks — sem o gate,
  # uma PR que não altera nenhum projeto mapeado
  # passa o CI sem nenhuma validação real.
  # ─────────────────────────────────────────────
  ci_gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [secrets_scan, project_quality]
    # always() garante que o gate roda mesmo quando
    # project_quality foi pulado (matriz vazia).
    if: always()
    steps:
      - name: Avaliar resultado geral
        run: |
          SECRETS="${{ needs.secrets_scan.result }}"
          QUALITY="${{ needs.project_quality.result }}"

          echo "secrets_scan    : $SECRETS"
          echo "project_quality : $QUALITY"

          if [[ "$SECRETS" == "failure" || "$SECRETS" == "cancelled" ]]; then
            echo "::error::Secret scan falhou ou foi cancelado."
            exit 1
          fi

          if [[ "$QUALITY" == "failure" || "$QUALITY" == "cancelled" ]]; then
            echo "::error::Um ou mais projetos falharam nos checks de qualidade."
            exit 1
          fi

          # "skipped" acontece quando nenhum projeto foi detectado
          # (só arquivos não mapeados foram alterados). Consideramos válido.
          # Para bloquear esse caso, troque a condição acima por:
          #   "$QUALITY" == "failure" || "$QUALITY" == "cancelled" || "$QUALITY" == "skipped"
          echo "CI concluído com sucesso."