name: IoT Deploy

run-name: Fall Detection Deploy - v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy"
        required: true

jobs:
    validate_environment:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Validate deployments details
              shell: bash
              run: |
                if [[ ${{ github.ref_name }} != "master" ]]; then
                  echo "Esse workflow deve ser executado apenas na branch master"
                  exit 1
                fi

    project_build:
        name: Project compilation
        needs: validate_environment
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.11"
                cache: pip
                cache-dependency-path: fall-detection/requirements.txt

            - name: Install dependencies
              working-directory: fall-detection
              run: pip install -r requirements.txt

            - name: Build project
              working-directory: fall-detection
              # `python src/main.py` puts `src/` on sys.path, so `import src` fails.
              # Running as a module keeps the project root on PYTHONPATH.
              run: python -m src.main

    publish_docker_image:
        name: Publish Docker image
        needs: project_build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push Docker image
              uses: docker/build-push-action@v4
              with:
                context: .
                file: docker-compose/dockerfiles/fall-detection.dockerfile
                platform: linux/arm64
                push: true
                tags: ${{secrets.DOCKERHUB_USERNAME}}/fall-detection:${{ inputs.version }},${{secrets.DOCKERHUB_USERNAME}}/fall-detection:latest